<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Orbitron Zero – Savoir-Faire</title>
  <style>
    body {
      background-color: #0d0d0d;
      color: #00ffe7;
      font-family: 'Courier New', Courier, monospace;
      padding: 2em;
      line-height: 1.6;
    }
    h1, h2 {
      color: #00ff99;
      text-transform: uppercase;
      border-bottom: 1px solid #00ff99;
      padding-bottom: 0.3em;
    }
    ul {
      list-style-type: '🧠 ';
      padding-left: 1em;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background-color: #111;
      padding: 2em;
      border-radius: 10px;
      box-shadow: 0 0 20px #00ffe7;
    }
    #manifesto p {
      margin: 0.5em 0;
      padding-left: 1em;
      border-left: 2px solid #00ff99;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛰️ Orbitron Zero</h1>
    <p id="signature">Chargement...</p>

    <h2>🔐 Valeurs</h2>
    <ul id="valeurs"></ul>

    <h2>🧩 Modules</h2>
    <ul id="modules"></ul>

    <h2>📜 Manifeste</h2>
    <div id="manifesto"></div>
  </div>

  <script>
    fetch('savoir_faire.json')
      .then(response => response.json())
      .then(data => {
        const sf = data.savoir_faire;
        document.getElementById('signature').textContent =
          `Créateur : ${sf.créateur} | Origine : ${sf.origine.plateforme} / ${sf.origine.écosystème}`;

        sf.valeurs.forEach(val => {
          const li = document.createElement('li');
          li.textContent = val;
          document.getElementById('valeurs').appendChild(li);
        });

        sf.architecture.modules.forEach(mod => {
          const li = document.createElement('li');
          li.textContent = `${mod.nom} → ${mod.fonction} (Autonomie : ${mod.autonomie})`;
          document.getElementById('modules').appendChild(li);
        });

        sf.manifesto.forEach(line => {
          const p = document.createElement('p');
          p.textContent = `» ${line}`;
          document.getElementById('manifesto').appendChild(p);
        });
      })
      .catch(error => {
        document.getElementById('signature').textContent = "Erreur de chargement du manifeste.";
        console.error("Erreur JSON :", error);
      });
  </script>
</body>
</html>
