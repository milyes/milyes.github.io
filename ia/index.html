<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <style>
        body { background: #050505; color: #00d4ff; font-family: 'Courier New', monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .ia-box { border: 1px solid #00d4ff; padding: 30px; background: rgba(0, 10, 20, 0.8); box-shadow: 0 0 30px #00d4ff; position: relative; }
        .ia-box::before { content: "CORE_IA_ACTIVE"; position: absolute; top: -10px; left: 10px; background: #00d4ff; color: #000; font-size: 0.7em; padding: 2px 5px; }
        h1 { font-size: 1.5em; letter-spacing: 3px; }
        .status { color: #fff; font-size: 0.9em; border-left: 3px solid #00d4ff; padding-left: 10px; }
        .scanline { width: 100%; height: 2px; background: rgba(0, 212, 255, 0.3); position: absolute; top: 0; animation: scan 3s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>
    <div class="ia-box">
        <div class="scanline"></div>
        <h1>MODULE IA - SYSTÈME SOUVERAIN</h1>
        <div class="status">

        </div>
